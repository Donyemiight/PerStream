name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy frontend bundle to docs/
        run: |
          rm -rf docs-deployed
          mkdir -p docs-deployed
          cp -r frontend/* docs-deployed/
          # Remove demo-mode.js (we want real backend, not in-browser sim)
          rm -f docs-deployed/assets/demo-mode.js
          # Inject current tunnel URL — Pages workflow has access to secrets
          TUNNEL="${PERSTREAM_TUNNEL:-https://tired-minute-faster-grey.trycloudflare.com}"
          for f in docs-deployed/*.html; do
            if grep -q 'PERSTREAM_API' "$f"; then
              sed -i "s|https://[a-zA-Z0-9-]*\.trycloudflare\.com|$TUNNEL|g" "$f"
            else
              # Inject PERSTREAM_API before the first <script>
              sed -i "0,/<script[^>]*>/s||&\\n<script>window.PERSTREAM_API = \\\"$TUNNEL\\\";</script>|" "$f"
            fi
            # Bump cache buster
            sed -i 's|v=98[a-z]*|v=pages|g; s|v=098final|v=pages|g; s|v=pages[0-9]*|v=pages|g' "$f"
          done
          # Replace /docs/<file> content with /docs-deployed/<file>
          rm -rf docs/AGENT_STORY.md docs/API.md docs/CONTRACT_DEPLOY.md docs/DEMO.md docs/FOR_PODCASTERS.md docs/HOSTING.md docs/HOW_PAYMENTS_WORK.md docs/LIVE_DEPLOY.md docs/LIVE_URLS.md docs/PITCH.md docs/SPEC.md docs/SUBMISSION.md docs/TROUBLESHOOTING.md docs/VERIFY_ON_ARCSCAN.md docs/LIVE_SETUP.html docs/assets docs/creator.html docs/index.html docs/listen.html 2>/dev/null || true
          cp -r docs-deployed/* docs/
          rm -rf docs-deployed

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
