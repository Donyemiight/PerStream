<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
  </defs>

  <!-- Prism (triangle) -->
  <polygon points="50,15 85,80 15,80" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linejoin="round"/>

  <!-- Light beam entering -->
  <line x1="5" y1="50" x2="32" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.9"/>

  <!-- Spectrum exiting (6 colors) -->
  <line x1="78" y1="65" x2="105" y2="55" stroke="#ff4466" stroke-width="2"/>
  <line x1="78" y1="68" x2="105" y2="62" stroke="#ff8c44" stroke-width="2"/>
  <line x1="78" y1="71" x2="105" y2="69" stroke="#ffcc00" stroke-width="2"/>
  <line x1="78" y1="74" x2="105" y2="76" stroke="#44ff88" stroke-width="2"/>
  <line x1="78" y1="77" x2="105" y2="83" stroke="#00d4ff" stroke-width="2"/>
  <line x1="78" y1="80" x2="105" y2="90" stroke="#aa44ff" stroke-width="2"/>
</svg>